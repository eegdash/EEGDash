learning_objectives:
- After this tutorial you will be able to explain why a model that works within one
  session may degrade across sessions of the same subject (electrode placement, impedance,
  attention, fatigue, time-of-day).
- After this tutorial you will be able to build a cross-session split with `eegdash.splits.get_splitter("cross_session")`
  keyed off the BIDS `session` entity.
- After this tutorial you will be able to assert that no session appears in both train
  and test for any (subject, fold) pair, while subjects remain shared by design.
- After this tutorial you will be able to compare cross-session accuracy with within-subject
  accuracy from plot_50 to quantify calibration drift.
audience: Intermediate user who completed plot_11, plot_12, and plot_50. Has seen
  subject-disjoint splits; learns here that session disjointness is a separate, weaker
  generalisation claim than cross-subject.
budgets:
  max_loc: 309
  max_runtime_seconds: 240
  max_network_mb: 50
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_52.png
  figures:
  - figure_cross_session_score_box.png
  - figure_session_drift_per_subject.png
  - figure_split_audit.png
asserted_invariants:
- 'session_overlap(train, test) == 0   # within each (subject, fold) pair'
- 'subject_overlap(train, test) > 0    # within-subject by design'
- n_folds >= n_sessions_min_subject
- abs(class_balance_train - class_balance_test) < 0.10
- fold_accuracy_mean reported with chance_level from majority_baseline
- drift_delta = within_subject_acc - cross_session_acc reported per subject
- leakage_report['column'] == 'session' and leakage_report['overlap'] == 0
