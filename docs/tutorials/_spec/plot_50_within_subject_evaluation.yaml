id: plot_50_within_subject_evaluation
category: F-evaluation
title: "Evaluate within-subject decoding with k-fold splits"
state: proposed
assignee: null
difficulty: 2
estimated_runtime_minutes: 4
hardware: cpu
network: cached_first_run
prerequisites:
  - plot_11_leakage_safe_split
  - plot_12_train_a_baseline
cites:
  plan:
    - "tutorial_restructure_plan.md#L25-L50"
    - "tutorial_restructure_plan.md#L425-L442"
    - "tutorial_restructure_plan.md#L484-L510"
    - "tutorial_restructure_plan.md#L1158-L1178"
  rubric:
    - "compass_artifact.md#E2.13"
    - "compass_artifact.md#E2.16"
    - "compass_artifact.md#E2.17"
    - "compass_artifact.md#E2.20"
    - "compass_artifact.md#E3.21"
    - "compass_artifact.md#E3.23"
    - "compass_artifact.md#E3.27"
    - "compass_artifact.md#E5.42"
