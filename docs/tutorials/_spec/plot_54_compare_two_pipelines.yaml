learning_objectives:
- After this tutorial you will be able to score two pipelines (a feature-based scikit-learn
  pipeline and a small neural network) on the SAME N held-out subjects via one shared
  cross-subject split manifest.
- After this tutorial you will be able to assert ``fold_ids_pipeline_a == fold_ids_pipeline_b``
  in code and run a paired Wilcoxon signed-rank test together with a paired t-test
  on the per-subject deltas.
- After this tutorial you will be able to compute and report Cohen's d on the paired
  differences and a 95% CI on the mean delta from the standard error.
- After this tutorial you will be able to read a three-panel figure (per-subject paired
  bars, paired-difference distribution with mean and CI, cumulative-wins curve) that
  makes the per-subject pattern, the average effect, and its uncertainty visible in
  one read.
- "After this tutorial you will be able to phrase the conclusion with the hedging
  Demsar 2006 recommends -- single dataset, fixed hyperparameters, narrow inference."
audience: Intermediate user who completed plot_11, plot_12, plot_42 and plot_51. Knows
  how to run each pipeline alone; learns here how to compare them paper-style under
  one shared cross-subject manifest with a paired test and an effect size.
budgets:
  max_loc: 470
  max_runtime_seconds: 300
  max_network_mb: 50
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_54.png
  figures:
  - figure_paired_comparison.png
  - figure_paired_difference_distribution.png
  - figure_cumulative_wins_curve.png
asserted_invariants:
- 'fold_ids_pipeline_a == fold_ids_pipeline_b   # same split manifest reused'
- subject_overlap(train, test) == 0
- len(per_subject_scores_a) == len(per_subject_scores_b) and len(per_subject_scores_a) >= 5
- wilcoxon_signed_rank_p_value reported alongside paired t-test p-value and Cohen's d
- mean_delta reported with a 95% CI from the standard error of the mean
- chance_level reported on the same axes for BOTH pipelines
- abs(class_balance_train - class_balance_test) < 0.10
- leakage_report['column'] == 'subject' and leakage_report['overlap'] == 0
