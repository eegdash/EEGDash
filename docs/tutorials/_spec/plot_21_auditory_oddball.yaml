  figures:
  - figure_auditory_vs_visual_erp.png
  - figure_latency_comparison.png
  - figure_metric_table_compare.png
asserted_invariants:
- n_target_epochs > 0 and n_standard_epochs > 0
- epochs.info['sfreq'] == reference_sfreq_from_plot_20
- epochs.tmin == reference_tmin and epochs.tmax == reference_tmax
- leakage_report['overlap'] == 0
- auditory_p300_peak_latency_ms reported with hedged language
- metric_table contains both auditory and visual rows for direct comparison
