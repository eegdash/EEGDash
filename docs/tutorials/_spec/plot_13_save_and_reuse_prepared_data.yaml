learning_objectives:
  - "After this tutorial you will be able to serialise a prepared windows or features dataset to disk with metadata and version stamps."
  - "After this tutorial you will be able to reload the saved artifact in a new kernel and verify shape, label, and subject parity."
  - "After this tutorial you will be able to record the package versions, random seed, and split manifest hash alongside the saved data."
  - "After this tutorial you will be able to consume the saved artifact from a downstream tutorial without re-running preprocessing."
audience: "Beginner who finished plot_10/11/12. Knows that preprocessing is expensive; this lesson shows how to stop paying that cost on every iteration."
budgets:
  max_loc: 220
  max_runtime_seconds: 180
  max_network_mb: 50
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_13.png
  figures:
    - figure_save_reload_roundtrip.png
    - figure_artifact_manifest.png
asserted_invariants:
  - "saved_artifact_path exists"
  - "reloaded_dataset.shape == original_dataset.shape"
  - "reloaded_dataset.metadata == original_dataset.metadata"
  - "manifest contains: eegdash_version, mne_version, braindecode_version, random_seed, split_manifest_hash"
  - "second_run_runtime_seconds < first_run_runtime_seconds  # demonstrate cache reuse"
