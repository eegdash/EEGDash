learning_objectives:
- After this tutorial you will be able to load a pretrained Braindecode/foundation-model
  checkpoint and inspect its expected input shape (channels, samples, sampling rate).
- After this tutorial you will be able to reset the classification head, freeze the
  backbone, and confirm with a parameter count which tensors will receive gradients.
- After this tutorial you will be able to run a short fine-tune on a leakage-safe
  cross-subject split and compare it against a from-scratch and a linear-probe baseline.
- After this tutorial you will be able to switch between freeze/unfreeze patterns
  (linear probe, last-block fine-tune, full fine-tune) and read off the trade-off
  curve.
audience: "Advanced user with prior plot_12 (training) and plot_70 (challenge dataset).\
  \ Project-tier; PRIMM exempt; assumes GPU. Spec note: this tutorial is gated on\
  \ a stable Braindecode foundation-model API and may not be runnable today (plan\
  \ \xA7L1228-L1229)."
budgets:
