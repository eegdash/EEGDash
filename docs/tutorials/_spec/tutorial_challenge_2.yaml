id: tutorial_challenge_2
category: challenge
kind: tutorial
output_kind: python
title: "EEG2025 Foundation Challenge 2 starter kit (predict the p-factor)"
state: proposed
assignee: null
difficulty: 3
estimated_runtime_minutes: 8
hardware: cpu
network: cached_first_run
prerequisites:
  - plot_70_challenge_dataset_basics
  - plot_42_features_to_sklearn
  - plot_72_subject_invariant_regression
cites:
  plan:
    - "tutorial_restructure_plan.md#Challenge_starter_kits"
  rubric:
    - "compass_artifact.md#E1.2"
    - "compass_artifact.md#E2.20"
    - "compass_artifact.md#E3.21"
    - "compass_artifact.md#E3.23"
    - "compass_artifact.md#E3.24"
    - "compass_artifact.md#E4.32"
    - "compass_artifact.md#E4.33"
    - "compass_artifact.md#E5.42"
    - "compass_artifact.md#E5.43"
    - "compass_artifact.md#E5.44"
    - "compass_artifact.md#E5.45"
    - "compass_artifact.md#E5.46"
learning_objectives:
  - "After this tutorial you will be able to load EEG2025 Challenge 2 recordings via `EEGChallengeDataset` with the `p_factor` target attached through `description_fields`."
  - "After this tutorial you will be able to fit a `StandardScaler -> Ridge` regression head on top of a small feature table with a strict cross-subject 5-fold split."
  - "After this tutorial you will be able to report Pearson r, R^2, and MAE on pooled held-out predictions and contrast them against `eegdash.splits.median_baseline`."
  - "After this tutorial you will be able to produce a leaderboard-style result card placing the starter-kit baseline next to chance and the public top score."
  - "After this tutorial you will be able to phrase the result in clinical-cautious language: small N, single dataset, p-factor as a derived score, not a diagnosis."
audience: "Advanced user; prior plot_42 (features-to-sklearn), plot_70 (challenge dataset basics), and plot_72 (subject-invariant regression). Project-tier scaffolding rules apply."
budgets:
  max_loc: 480
  max_runtime_seconds: 480
  max_network_mb: 1500
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/tutorial_challenge_2.png
  figures:
    - figure_target_distribution.png
    - figure_pred_vs_true_scatter.png
    - figure_leaderboard_card.png
asserted_invariants:
  - "subject_overlap(train, test) == 0   # the defining property of cross-subject regression"
  - "leakage_report['column'] == 'subject' and leakage_report['overlap'] == 0"
  - "n_test_subjects_per_fold >= 1 and n_folds >= 5"
  - "r2_test reported alongside mae_test and median_baseline_mae"
  - "model_mae_test < median_baseline_mae   # a well-trained baseline beats predicting the median"
  - "p_factor_label_dtype is float and not nan-only"
  - "leaderboard_rows has at least one row per regime (chance, starter, target)"
  - "no_clinical_diagnosis_claim_in_prose   # reviewer hedging gate"
sections_required:
  - title
  - opening
  - learning_objectives
  - requirements
  - setup
  - lesson_steps:
      min: 6
      labelled_subgoals: true
  - checkpoints:
      min: 4
  - result
  - wrapup
  - links
primm_required:
  predict: 1
  run: ">=2"
  investigate: 1
faded_scaffolding:
  required: true
  pattern: parsons
viz_compliance:
  palette: eegdash-rail
  required_elements:
    - subject_count_in_subtitle
    - dataset_id_in_subtitle
    - source_provenance_footer
    - leaderboard_card_panel
links:
  concept: docs/source/concepts/leakage_and_evaluation.rst
  api: eegdash.dataset
  related_how_to:
    - how_to_use_hpc_cache
  related_papers:
    - "EEG2025 Foundation Challenge - Challenge 2 (subject-invariant p-factor regression)"
    - "Alexander et al. 2017, Sci. Data - HBN dataset (doi:10.1038/sdata.2017.181)"
    - "Caspi et al. 2014, Clin. Psychol. Sci. - the p-factor (doi:10.1177/2167702613497473)"
    - "McElroy et al. 2017, J. Child Psychol. Psychiatry - CBCL factor structure (doi:10.1111/jcpp.12849)"
    - "Delorme et al. 2022, NAR Genom. Bioinform. - NEMAR (doi:10.1093/nargab/lqac023)"
    - "Cisotto & Chicco 2024, PeerJ CS - clinical-EEG ten quick tips (doi:10.7717/peerj-cs.2256)"
    - "Pedregosa et al. 2011, JMLR - scikit-learn (doi:10.5555/1953048.2078195)"
    - "Nederbragt et al. 2020, PLOS Comput. Biol. - ten simple rules for teaching coding (doi:10.1371/journal.pcbi.1008090)"
requires_api:
  - "eegdash.EEGChallengeDataset"
  - "eegdash.splits.get_splitter"
  - "eegdash.splits.make_split_manifest"
  - "eegdash.splits.apply_split_manifest"
  - "eegdash.splits.assert_no_leakage"
  - "eegdash.splits.median_baseline"
  - "eegdash.viz.use_eegdash_style"
  - "eegdash.viz.style_figure"
  - "sklearn.linear_model.Ridge"
  - "sklearn.preprocessing.StandardScaler"
  - "sklearn.pipeline.Pipeline"
  - "sklearn.metrics.mean_absolute_error"
  - "sklearn.metrics.r2_score"
  - "scipy.stats.pearsonr"
review_rubric_overrides:
  E2.13: exempt
  E2.16: exempt
  E2.18: info
