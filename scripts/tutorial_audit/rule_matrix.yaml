# Difficulty-aware rule activation for the EEGDash tutorial audit.
#
# Source: docs/tutorial_implementation_strategy.md, Appendix A.
# Each rule has a default severity. Difficulty-specific overrides relax or
# tighten the level for a given star tier (1 = beginner, 2 = intermediate,
# 3 = advanced/project). Kind-specific overrides further branch on
# spec.kind (tutorial | how-to). The level "exempt" means the rule is not
# applied. Rule ids ending in ``.howto`` are how-to-specific replacements
# emitted by the static validators (e.g. E1.1.howto, E2.20.howto,
# E4.34.howto).
#
# Levels: error | warn | info | exempt
defaults:
  E1.*: error
  E2.*: warn
  E3.*: error
  E4.*: warn
  E5.*: error
  E6.*: warn
  DV.*: warn
overrides:
  difficulty_1:
    E2.13: error
    E2.16: error
    E2.20: error
    E5.42: error
    E5.43: error
  difficulty_2:
    E2.13: warn
    E2.16: warn
    E5.42: error
    E5.43: error
  difficulty_3:
    E2.13: exempt
    E2.16: exempt
    E2.18: info
    E5.42: error      # leakage is non-negotiable at any level
    E5.43: error
  kind_how_to:
    # PRIMM scaffolding (E2.13) and tutorial-style learning objectives
    # (E2.20) are tutorial-quadrant rules. How-tos exempt them and the
    # validators emit ``E2.20.howto`` (Goal section) instead.
    E2.13: exempt
    E2.20: exempt
    # Motivating-question check is replaced with a "Goal" check.
    E4.31: exempt
    # Extensions block becomes "Common pitfalls" (rule id E4.34.howto).
    E4.34: exempt
    # Concept-link cross-reference is encouraged but not required.
    E6.48: info
    # How-to-specific rule activations:
    E1.1.howto: error
    E2.20.howto: error
    E4.34.howto: warn
  output_kind_markdown:
    # Markdown how-tos have no Python AST to walk. The validators short
    # circuit; this matrix documents the expected behaviour.
    E1.2: info       # docstring check skipped (no Python module)
    E1.4: exempt     # sphinx-gallery cell delimiters do not apply
    E3.21: exempt    # RNG seeding cannot be inspected via AST
    E5.37: exempt    # filter disclosure cannot be inspected via AST
