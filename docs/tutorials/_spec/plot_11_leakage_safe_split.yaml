learning_objectives:
- After this tutorial you will be able to build a leakage-safe train/test split on
  EEG records using `eegdash.splits.get_splitter` and a MOABB-backed cross-subject
  scheme.
- After this tutorial you will be able to run `assert_no_leakage` and read its emitted
  JSON report.
- After this tutorial you will be able to compare a naive window-level random split
  (which leaks subjects) against a subject-aware split on the same windows.
- After this tutorial you will be able to print a split summary that names the splitter,
  fold count, subjects per fold, and class balance.
audience: Beginner ML user with one prior EEGDash tutorial (plot_10). Has heard of
  train/test splits; the leakage pitfall is introduced in this lesson.
budgets:
  max_loc: 560
  max_runtime_seconds: 180
  max_network_mb: 50
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_11.png
  figures:
  - figure_split_audit.png
  - figure_leaky_vs_safe_confusion.png
asserted_invariants:
- n_subjects_total > 10
- subject_overlap(train, test) == 0
- n_folds >= 5
- abs(class_balance_train - class_balance_test) < 0.10
- leakage_report['overlap'] == 0
- 'naive_random_split_overlap > 0  # demonstrated as the bad case'
