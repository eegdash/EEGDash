learning_objectives:
- After this tutorial you will be able to load HBN eyes-open / eyes-closed resting-state
  recordings via `EEGDashDataset` (or the `mini=True` HBN release for CI).
- After this tutorial you will be able to reannotate EO/EC intervals from session
  annotations and create balanced fixed-length windows.
- After this tutorial you will be able to inspect one signal segment and a PSD that
  shows the textbook posterior alpha bump in eyes-closed.
- After this tutorial you will be able to train a simple classifier on a subject-aware
  split and report accuracy and chance level.
audience: Beginner who has worked through Cat A and Cat B. Knows about windows, splits,
  and baselines; learns about annotations and resting-state framing here.
budgets:
  max_loc: 620
  max_runtime_seconds: 360
  max_network_mb: 200
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_30.png
  figures:
  - figure_signal_eo_vs_ec.png
  - figure_psd_alpha_bump.png
  - figure_confusion_matrix.png
asserted_invariants:
- n_subjects_total >= 10
- 'abs(n_windows_eo - n_windows_ec) / max(n_windows_eo, n_windows_ec) < 0.20  # balanced'
- leakage_report['overlap'] == 0
- 'psd_alpha_power_ec >= psd_alpha_power_eo  # textbook expectation, hedged in prose'
- model_accuracy_test reported with chance level computed from class balance
