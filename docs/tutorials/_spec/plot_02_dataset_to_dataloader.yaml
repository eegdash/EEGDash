learning_objectives:
- After this tutorial you will be able to chain a small EEGDash dataset, one or two
  safe preprocessors, and a fixed-length window step.
- After this tutorial you will be able to inspect a single `(X, y)` window and predict
  its tensor shape from `n_channels`, `window_size`, and `sfreq`.
- After this tutorial you will be able to wrap windows in a PyTorch `DataLoader` and
  read one batch shape without training a model.
- After this tutorial you will be able to seed RNGs (`np.random`, `torch`) so a teammate
  gets the same first batch.
audience: Beginner familiar with plot_00 and plot_01. Has used PyTorch tensors but
  not necessarily Braindecode; no model-training expected here.
budgets:
  max_loc: 273
  max_runtime_seconds: 60
  max_network_mb: 100
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_02.png
  figures:
  - figure_window_layout.png
  - figure_batch_shape.png
asserted_invariants:
- len(windows) >= batch_size
- 'X.ndim == 3  # (batch, channels, time)'
- X.shape[0] == batch_size
- X.shape[1] == n_channels
- X.shape[2] == int(window_size_seconds * sfreq)
- len(set(y_batch.tolist())) >= 1
