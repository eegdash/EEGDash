  - figure_finetune_vs_scratch_box.png
  - figure_split_audit.png
asserted_invariants:
- 'head_reset is True   # the loaded classification head is replaced before fine-tune'
- frozen_param_count + trainable_param_count == total_param_count
- trainable_param_count_linear_probe < trainable_param_count_full_finetune
- subject_overlap(train, test) == 0
- leakage_report['column'] == 'subject' and leakage_report['overlap'] == 0
- abs(class_balance_train - class_balance_test) < 0.10
- finetune_accuracy_mean reported with chance_level on the same axes
- model_versions_printed includes braindecode and torch and the checkpoint hash
