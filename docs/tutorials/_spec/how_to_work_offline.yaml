output_kind: python
title: "Use EEGDash with download=False against a local cache"
state: proposed
assignee: null
difficulty: 1
estimated_runtime_minutes: 4
hardware: cpu
network: cached_first_run
prerequisites:
  - how_to_download_a_dataset
cites:
  plan:
    - "tutorial_restructure_plan.md#L471-L483"
    - "tutorial_restructure_plan.md#L495-L496"
    - "tutorial_restructure_plan.md#L1021-L1036"
    - "tutorial_restructure_plan.md#L1131-L1144"
    - "tutorial_restructure_plan.md#L1158-L1178"
    - "tutorial_restructure_plan.md#L1198-L1206"
  rubric:
    - "compass_artifact.md#E1.2"
    - "compass_artifact.md#E2.20"
