learning_objectives:
  - "After this how-to you will be able to call `eegdash.features.extract_features(..., n_jobs=...)` with a value matched to the node's CPU/IO profile, and explain why `n_jobs=-1` is rarely the right default on a shared node."
  - "After this how-to you will be able to choose a batch size for the feature pipeline that keeps each worker busy without exhausting memory, using one observed runtime as evidence."
  - "After this how-to you will be able to persist the resulting feature table once and reload it across tutorials/jobs, avoiding repeated Welch spectra."
  - "After this how-to you will be able to read a small scaling table (n_jobs vs. wall-clock time) and pick the regime where adding workers no longer pays."
audience: "User comfortable with plot_40 (first features) who now needs to scale feature extraction across hundreds of recordings on one node or one SLURM array shard."
budgets:
  max_loc: 200
  max_runtime_seconds: 600
  max_network_mb: 200
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/how_to_parallelize_feature_extraction.png
  figures:
    - figure_n_jobs_scaling_curve.png
    - figure_batch_size_memory_profile.png
asserted_invariants:
  - "n_jobs is taken from an environment variable (e.g., $SLURM_CPUS_PER_TASK) or argument, never hard-coded to -1"
  - "extracted_feature_table.shape[0] == n_windows_total   # no rows dropped silently"
  - "feature_table_persistence_path exists after the first run and is reloaded on the second"
  - "second_run_wall_clock < first_run_wall_clock   # persistence reused"
  - "scaling_table reports wall_clock and peak_memory_mb for at least 3 n_jobs settings"
