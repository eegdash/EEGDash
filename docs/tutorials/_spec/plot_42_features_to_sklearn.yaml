id: plot_42_features_to_sklearn
category: E-feature-engineering
title: Train a scikit-learn baseline on EEGDash features
state: proposed
assignee: null
difficulty: 2
estimated_runtime_minutes: 5
hardware: cpu
network: cached_first_run
prerequisites:
- plot_40_first_features
- plot_11_leakage_safe_split
cites:
  plan:
  - tutorial_restructure_plan.md#L410-L423
  - tutorial_restructure_plan.md#L502-L510
  - tutorial_restructure_plan.md#L1009-L1019
  - tutorial_restructure_plan.md#L1158-L1178
  rubric:
  - compass_artifact.md#E1.2
  - compass_artifact.md#E2.13
  - compass_artifact.md#E2.20
