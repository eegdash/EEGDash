  - "Cisotto and Chicco 2024, PeerJ CS, clinical EEG ten quick tips"
  - "Delorme et al. 2022, Database, NEMAR open compute resource"
  - "Pernet et al. 2019, Sci. Data, EEG-BIDS extension"
requires_api:
