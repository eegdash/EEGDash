learning_objectives:
  - "After this how-to you will be able to copy a `.slurm` job template that activates the project environment, sets `cache_dir`, and runs an EEGDash preprocessing entry-point reproducibly."
  - "After this how-to you will be able to configure the job for an array task that maps `$SLURM_ARRAY_TASK_ID` to a per-subject or per-recording shard."
  - "After this how-to you will be able to enable checkpointing so a re-queued job picks up where the previous attempt stopped (per-shard outputs and atomic moves)."
  - "After this how-to you will be able to capture per-shard logs to a job-specific directory and surface a manifest summarising successes, skips, and failures."
audience: "User on a SLURM cluster who has already downloaded the data and knows how to load it offline. This how-to is a template + commentary, not a Python script."
budgets:
  max_loc: 200
  max_runtime_seconds: 600
  max_network_mb: 0
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/how_to_run_preprocessing_on_slurm.png
  figures:
    - figure_slurm_array_topology.png
asserted_invariants:
  - "the .slurm template sources or activates the project environment (conda/uv/venv) explicitly"
  - "cache_dir is set from a cluster-provided env var (e.g., $SCRATCH), not hard-coded"
  - "the template uses `#SBATCH --array` to shard the workload, with one output per task"
  - "each shard writes to a per-task subdirectory and renames atomically to avoid partial outputs on re-queue"
  - "stdout and stderr are captured per task (`--output=logs/%A_%a.out`)"
  - "a final manifest summarises shard status (succeeded / skipped / failed) and is checked into the job artifacts"
