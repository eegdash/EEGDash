learning_objectives:
- After this tutorial you will be able to load EEG2025 Challenge 1 windows for two
  tasks (resting-state pretext, contrastChangeDetection target) using `EEGChallengeDataset`
  and aligned preprocessing.
- After this tutorial you will be able to pretrain a small Braindecode encoder on
  the resting-state task and snapshot its weights to a file.
- After this tutorial you will be able to fine-tune the pretrained encoder on the
  contrastChangeDetection task with a fresh classification head and compare against
  a from-scratch baseline on the same cross-subject split.
- After this tutorial you will be able to report the cross-task transfer delta with
  chance level on the same axes and hedge the conclusion (single seed, mini release,
  fixed hyperparameters).
audience: Advanced user already comfortable with plot_12 (training) and plot_70 (challenge
  dataset). This is project-tier material; PRIMM scaffolding is exempt per the difficulty-3
  rubric.
budgets:
  max_loc: 510
  max_runtime_seconds: 1500
  max_network_mb: 1500
  cpu_only: false
  gpu_required: true
artifacts:
  thumbnail: thumbnails/plot_71.png
  figures:
  - figure_pretrain_loss_curves.png
  - figure_finetune_vs_scratch_box.png
  - figure_split_audit.png
asserted_invariants:
- 'subject_overlap(train, test) == 0   # cross-subject for the target task'
- leakage_report['column'] == 'subject' and leakage_report['overlap'] == 0
- 'pretext_subjects == target_subjects   # same subject pool, different tasks'
- finetune_accuracy_mean - scratch_accuracy_mean reported with std across seeds
- 'finetune_accuracy_mean > scratch_accuracy_mean - 0.02   # transfer at least non-harmful
  on the toy run'
- chance_level reported on the same axes as both pipelines
- abs(class_balance_train - class_balance_test) < 0.10
- encoder_weights_path exists after pretrain and is loaded before fine-tune
