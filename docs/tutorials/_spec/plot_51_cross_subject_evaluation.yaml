learning_objectives:
- After this tutorial you will be able to explain why cross-subject evaluation is
  the gold standard for generalisation claims in EEG decoding.
- After this tutorial you will be able to build a 5-fold cross-subject split with
  `eegdash.splits.get_splitter("cross_subject", n_folds=5)` and verify subject disjointness
  with `assert_no_leakage`.
- After this tutorial you will be able to report mean and standard deviation across
  folds and compare against the chance level computed from class balance.
- After this tutorial you will be able to read the `describe_split` summary and translate
  it into one English sentence about generalisation scope.
audience: Beginner ML user who completed plot_11 (leakage-safe split) and plot_12
  (baseline). This is the most common evaluation in EEG decoding and is intentionally
  kept very accessible.
budgets:
  max_loc: 300
  max_runtime_seconds: 240
  max_network_mb: 50
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_51.png
  figures:
  - figure_cross_subject_score_box.png
  - figure_fold_accuracy_bar.png
  - figure_split_audit.png
asserted_invariants:
- 'subject_overlap(train, test) == 0   # the defining property'
- n_folds >= 5
- n_test_subjects_per_fold >= 1
- abs(class_balance_train - class_balance_test) < 0.10
- fold_accuracy_mean reported with chance_level from majority_baseline
- fold_accuracy_std reported alongside the mean (no naked point estimate)
- leakage_report['column'] == 'subject' and leakage_report['overlap'] == 0
