    - "compass_artifact.md#E5.44"
    - "compass_artifact.md#E5.46"
learning_objectives:
  - "After this tutorial you will be able to identify scenarios where within-subject evaluation is the appropriate question (lab paradigms with high inter-subject variance, single-subject diagnostics, calibration-style decoders)."
  - "After this tutorial you will be able to build a k-fold within-subject split with `eegdash.splits.get_splitter(\"within_subject\", n_folds=5)` and serialise it via `make_split_manifest`."
  - "After this tutorial you will be able to assert that train and test windows for every fold come from the same subject (intentional subject overlap) while remaining trial-disjoint."
  - "After this tutorial you will be able to report per-subject accuracy with chance level and a class-balance check, and explain why the resulting score does not generalise to new subjects."
audience: "Intermediate user with plot_11 and plot_12 done. Knows that subject leakage is bad in cross-subject setups; this lesson contrasts that pitfall with the legitimate case where staying within a subject is the scientific question."
budgets:
  max_loc: 285
  max_runtime_seconds: 240
  max_network_mb: 50
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_50.png
  figures:
    - figure_within_subject_score_box.png
    - figure_per_subject_accuracy_bar.png
    - figure_split_audit.png
asserted_invariants:
  - "subject_overlap(train, test) == 1   # within-subject by design (opposite of plot_11)"
  - "trial_overlap(train, test) == 0     # no trial reused across folds"
  - "n_folds >= 5"
  - "abs(class_balance_train - class_balance_test) < 0.10"
  - "per_subject_accuracy reported with chance_level from majority_baseline"
  - "leakage_report['column'] == 'trial' and leakage_report['overlap'] == 0"
sections_required:
  - title
  - opening
  - learning_objectives
  - requirements
  - setup
  - lesson_steps:
      min: 5
      labelled_subgoals: true
  - checkpoints:
      min: 4
  - result
  - wrapup
  - links
primm_required:
  predict: 1
  run: ">=2"
  investigate: 1
  modify: 1
faded_scaffolding:
  required: true
  pattern: parsons
viz_compliance:
