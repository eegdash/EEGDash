learning_objectives:
- After this tutorial you will be able to instantiate `EEGDashDataset` for one subject/task
  and inspect `len(dataset)` and `dataset.description`.
- After this tutorial you will be able to read `raw.info['sfreq']`, channel count,
  duration, and annotations from a single recording.
- After this tutorial you will be able to plot a short signal segment or PSD and label
  axes, units, and the data source.
- After this tutorial you will be able to predict where data caches and how lazy loading
  affects the first call vs. subsequent calls.
audience: Beginner with one prior EEGDash tutorial (plot_00). Comfortable with NumPy
  and basic matplotlib; no MNE-Python experience required.
budgets:
  max_loc: 260
  max_runtime_seconds: 60
  max_network_mb: 100
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_01.png
  figures:
  - figure_signal_segment.png
  - figure_psd_overview.png
asserted_invariants:
- len(dataset) >= 1
- raw.info['sfreq'] > 0
- raw.info['nchan'] > 0
- 'raw.times[-1] - raw.times[0] > 1.0  # at least one second of data'
- cache_dir parametrised and reported in prose
