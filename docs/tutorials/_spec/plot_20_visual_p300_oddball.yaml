learning_objectives:
- After this tutorial you will be able to query a P300 oddball dataset, inspect annotations,
  and map raw event codes to `target` and `standard` labels.
- "After this tutorial you will be able to create event-locked epochs with baseline\
  \ correction (units: \xB5V) and a clearly stated time window."
- After this tutorial you will be able to plot the average ERP butterfly for target
  vs. standard and recognise a P300 component in the literature-typical 250-500 ms
  window.
- After this tutorial you will be able to train a baseline classifier on the epoched
  data with a subject-aware split and report accuracy alongside chance level for an
  imbalanced two-class task.
audience: Intermediate user who finished Cat B. Knows what an epoch is from plot_10;
  introduces ERP terminology and event mapping here.
budgets:
  max_loc: 260
  max_runtime_seconds: 300
  max_network_mb: 200
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_20.png
  figures:
  - figure_event_counts.png
  - figure_average_erp_butterfly.png
  - figure_target_vs_standard_topomap.png
  - figure_confusion_matrix.png
asserted_invariants:
- n_target_epochs > 0 and n_standard_epochs > 0
- 'n_standard_epochs / n_target_epochs >= 3  # oddball imbalance is preserved, not
  silently rebalanced'
- epochs.tmin <= 0 and epochs.tmax >= 0.5
- "baseline applied and unit reported as \xB5V"
- leakage_report['overlap'] == 0
- model_accuracy_test reported alongside chance level computed from class balance
