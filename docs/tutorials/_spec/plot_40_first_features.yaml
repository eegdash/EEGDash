  - compass_artifact.md#E5.44
  - compass_artifact.md#E5.45
learning_objectives:
- After this tutorial you will be able to load a small windows dataset (e.g., the
  EO/EC output of plot_10) and extract `signal_variance`, `RMS`, and standard EEG
  band powers (delta, theta, alpha, beta, gamma).
- After this tutorial you will be able to read the resulting feature table, where
  rows are windows and column names include channel names.
- After this tutorial you will be able to join feature rows with subject and label
  metadata for downstream ML.
- After this tutorial you will be able to save the feature dataset to disk for reuse
  in plot_42.
audience: Beginner who finished Cat A and at least plot_10. Knows what a band-pass
  filter is; learns about spectral power as a per-window feature here.
budgets:
  max_loc: 295
  max_runtime_seconds: 300
  max_network_mb: 100
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_40.png
  figures:
  - figure_feature_table_head.png
  - figure_band_power_per_channel.png
asserted_invariants:
- feature_table.shape[0] == n_windows
- 'feature_table.shape[1] >= 5  # at least RMS, variance, and three band powers'
- all column names contain a channel-name token
- feature_table.join(metadata).dropna(subset=['subject','label']).shape[0] == feature_table.shape[0]
- saved_features_path exists and reloads with the same dtypes
