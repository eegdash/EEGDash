learning_objectives:
- After this tutorial you will be able to compute a majority/median baseline and report
  it next to model accuracy.
- After this tutorial you will be able to train a small classifier (logistic regression
  on band-power features or `ShallowFBCSPNet`) on the train fold from plot_11.
- After this tutorial you will be able to evaluate on held-out subjects and produce
  a metric table including chance level.
- After this tutorial you will be able to seed all RNGs (`numpy`, `torch`, sklearn
  `random_state=`) so the metric table reproduces.
audience: Beginner ML user who has finished plot_10 and plot_11. Comfortable with
  logistic regression at a conceptual level; deep nets introduced as 'one alternative,'
  not the focus.
budgets:
  max_loc: 600
  max_runtime_seconds: 180
  max_network_mb: 50
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_12.png
  figures:
  - figure_baseline_diagnostic.png
asserted_invariants:
- 'leakage_report[''overlap''] == 0  # split inherited from plot_11'
- majority_baseline_accuracy >= chance_level - 0.02
- model_accuracy_test >= majority_baseline_accuracy
- model_accuracy_test_std reported across folds (n_folds >= 5)
- all RNGs seeded (numpy, torch, sklearn)
- 'training epochs <= 10  # ''increase for real work'' disclosure required'
