learning_objectives:
- After this tutorial you will be able to instantiate `EEGChallengeDataset(release='R2',
  cache_dir=..., mini=True)` and explain what `release` and `mini` control.
- 'After this tutorial you will be able to contrast `EEGChallengeDataset` with `EEGDashDataset`:
  the same loader plus a release-to-dataset map and a curated mini subject list.'
- After this tutorial you will be able to enumerate the recordings returned by the
  mini release and verify the subject set is a strict subset of the full release.
- After this tutorial you will be able to switch between online (default) and offline
  (`download=False`) modes against the same `cache_dir`.
audience: Beginner-to-intermediate user who has loaded one EEGDash recording (plot_01)
  and wants to start the EEG2025 challenge. Knows basic BIDS entities; learns what
  makes the challenge dataset object special here.
budgets:
  max_loc: 280
  max_runtime_seconds: 240
  max_network_mb: 200
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_70.png
  figures:
  - figure_release_subject_count.png
  - figure_mini_vs_full_subject_overlap.png
  - figure_recording_summary_grid.png
asserted_invariants:
- 'ds.release == requested_release   # the release attribute is surfaced'
- 'ds.mini is True   # mini=True is the default in the spec'
- 'set(mini_subject_ids).issubset(set(full_release_subject_ids))   # mini is a strict
  subset'
- 'len(mini_subject_ids) < len(full_release_subject_ids)   # subset is strict, not
  equal'
- all(rec['dataset'].startswith('EEG2025r') for rec in ds.description.to_dict('records'))
- 'offline_dataset_len == online_dataset_len   # same cache, same records'
sections_required:
- title
