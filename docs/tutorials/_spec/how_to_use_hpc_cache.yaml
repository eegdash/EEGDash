learning_objectives:
- After this how-to you will be able to choose between shared filesystems (Lustre,
  GPFS, NFS) and local-to-node storage (NVMe, RAM disk) for the EEGDash cache, given
  a workload profile (epoch IO vs. one-pass).
- After this how-to you will be able to set `cache_dir` from a SLURM environment variable
  (`$SCRATCH`, `$TMPDIR`, `$LOCAL_SCRATCH`) and validate the cache before training.
- After this how-to you will be able to stage a copy from shared to local-node storage
  at job-start with a small helper, and clean up at job-end.
- After this how-to you will be able to recognise the symptoms of metadata-server
  contention (slow first-epoch IO, throttling) and select the appropriate tier.
audience: User running EEGDash on a SLURM/LSF/PBS cluster. Already knows how to populate
  the cache and load offline.
budgets:
  max_loc: 200
  max_runtime_seconds: 300
  max_network_mb: 200
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/how_to_use_hpc_cache.png
  figures:
  - figure_storage_tier_io_throughput.png
  - figure_cache_layout_diagram.png
asserted_invariants:
- cache_dir resolves from environment (e.g., $SCRATCH or $TMPDIR), not a hard-coded
  path
- stage-in copies all queried records to local-node storage before training begins
- ds = EEGDashDataset(cache_dir=local_node_cache, download=False).records_count ==
  queried_record_count
- stage-out (or cleanup) is executed in a SLURM trap so partial caches are not left
  behind
- the recipe contrasts shared vs. local-node IO with at least one measured timing
