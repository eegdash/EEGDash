learning_objectives:
- After this tutorial you will be able to pick a stable EEGDash dataset, choose a
  channel subset, resample, and band-pass filter while reporting the pass-band, stop-band,
  and filter type.
- After this tutorial you will be able to set a montage and reference scheme explicitly
  with `set_montage` and `set_eeg_reference`.
- After this tutorial you will be able to create fixed-length or event-based windows
  and verify the window count matches the recording duration.
- After this tutorial you will be able to save the windows dataset to disk and reload
  it without re-running preprocessing.
audience: Beginner who finished the Start Here track. Some EEG vocabulary (channels,
  sampling rate, band-pass) introduced just-in-time; no signal-processing background
  assumed.
budgets:
  max_loc: 275
  max_runtime_seconds: 180
  max_network_mb: 100
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_10.png
  figures:
  - figure_filter_response.png
  - figure_psd_before_after.png
  - figure_window_grid.png
asserted_invariants:
- n_channels_after_selection == len(picks)
- raw_resampled.info['sfreq'] == target_sfreq
- filter_lowpass_hz < target_sfreq / 2
- len(windows) == int(np.floor(total_duration_s / window_size_s))
- windows[0][0].shape[1] == int(window_size_s * target_sfreq)
- saved_windows_path exists and reload returns equal shapes
