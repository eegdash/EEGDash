learning_objectives:
- After this project you will be able to pull resting-state ds005505 recordings
  with `eegdash.EEGDashDataset` and balance the cohort by the BIDS `sex` field.
- After this project you will be able to compute log band-power features
  (delta, theta, alpha, beta) per channel from fixed-length 2 s windows.
- After this project you will be able to run a 3-fold cross-subject loop with
  `sklearn.model_selection.GroupKFold` and fit a leakage-safe
  `StandardScaler -> LogisticRegression` Pipeline.
- After this project you will be able to read the three-panel sklearn-display
  diagnostic built from `DecisionBoundaryDisplay`, `RocCurveDisplay`, and
  `ConfusionMatrixDisplay`.
- After this project you will be able to write the limitations block that an
  EEG sex-classification paper actually needs (label-vs-biology distinction,
  cross-site confounds, linear-baseline-as-floor).
audience: Advanced applied user comfortable with sklearn pipelines, cross-subject
  splits, and clinical-EEG limitations writing. Builds on plot_11 (leakage) and
  plot_42 (sklearn pipeline).
budgets:
  max_loc: 580
  max_runtime_seconds: 300
  max_network_mb: 800
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/project_sex_classification.png
  figures:
  - figure_sex_classification_diagnostic.png
asserted_invariants:
- cross_subject_loop uses GroupKFold keyed on subject id (no leakage)
- per-fold AUC reported alongside chance line at 0.50 on a balanced cohort
- pooled balanced accuracy reported next to the confusion matrix
- StandardScaler fitted only on train slice (Pipeline construction per fold)
- all RNGs seeded (numpy, sklearn random_state=42)
- caveat block names label-vs-biology, confounds, and baseline-as-floor
