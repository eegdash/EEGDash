    - "Caspi et al. 2014, Clin. Psychol. Sci., the p-factor as a general dimension of psychopathology (doi:10.1177/2167702613497473)"
    - "Delorme et al. 2022, NAR Genom. Bioinform., NEMAR (doi:10.1093/nargab/lqac023)"
    - "Cisotto and Chicco 2024, PeerJ CS, clinical EEG ten quick tips (doi:10.7717/peerj-cs.2256)"
