learning_objectives:
  - "After this tutorial you will be able to construct a learning-curve splitter with `eegdash.splits.get_splitter(\"learning_curve\", data_size=...)` that grows the train pool while holding the test pool fixed."
  - "After this tutorial you will be able to plot accuracy as a function of training-set size with a standard-deviation band over `n_perms` repeats."
  - "After this tutorial you will be able to read the curve to decide whether collecting more data is likely to help, or whether the bottleneck is elsewhere."
  - "After this tutorial you will be able to report a chance-level baseline alongside the curve and call out the regime where the model first surpasses chance."
audience: "Intermediate user who completed plot_11, plot_12, and plot_51. Knows how to run a single cross-subject evaluation; here they sweep training-set size and read the curve."
budgets:
  max_loc: 300
  max_runtime_seconds: 300
  max_network_mb: 50
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_53.png
  figures:
    - figure_learning_curve.png
    - figure_per_size_score_box.png
    - figure_split_audit.png
asserted_invariants:
  - "subject_overlap(train, test) == 0   # cross-subject test pool held fixed"
  - "monotone_non_decreasing(learning_curve_mean) in expectation across data_size grid"
  - "len(data_size_grid) >= 4"
  - "n_perms_per_size >= 3"
  - "final_curve_point_mean >= 0.55     # chance-aware floor for the toy task"
  - "chance_level reported on the same axes as the curve"
  - "std_band drawn at +/- 1 standard deviation across n_perms repeats"
sections_required:
  - title
  - opening
  - learning_objectives
  - requirements
  - setup
  - lesson_steps:
      min: 5
      labelled_subgoals: true
  - checkpoints:
