learning_objectives:
  - "After this case study you will be able to load ds005505 with `EEGDashDataset` and surface `p_factor` through `description_fields`."
  - "After this case study you will be able to build a strict cross-subject split before windowing so no subject straddles train and validation."
  - "After this case study you will be able to train `braindecode.models.EEGConformer` end-to-end with `torch.optim.AdamW` and report MSE, Pearson r, R^2, and MAE across seeds."
  - "After this case study you will be able to read a 3-panel deep-regression diagnostic: training curves, predicted-vs-true scatter, and a gradient-saliency map."
  - "After this case study you will be able to phrase the result in clinical-cautious language: small N, single dataset, p-factor as a derived score not a diagnosis."
audience: "Advanced applied user with prior plot_72 (feature-based subject-invariant regression) and plot_12 (baseline training). Project-tier scaffolding rules apply; assumes GPU is available but degrades to CPU on the synthetic surrogate."
budgets:
  max_loc: 440
  max_runtime_seconds: 1500
  max_network_mb: 1500
  cpu_only: false
  gpu_required: false
artifacts:
  thumbnail: thumbnails/project_pfactor_deep.png
  figures:
    - figure_training_curves.png
    - figure_pred_vs_true_scatter.png
    - figure_saliency_map.png
asserted_invariants:
  - "subject_overlap(train, val) == 0   # the defining property of cross-subject regression"
  - "n_val_subjects >= 2 and n_train_subjects >= n_val_subjects"
  - "best_val_r reported alongside MSE, R^2, and MAE on held-out subjects"
  - "p_factor_label_dtype is float and not nan-only"
  - "no_clinical_diagnosis_claim_in_prose   # reviewer hedging gate"
sections_required:
  - title
  - opening
  - learning_objectives
  - requirements
  - setup
  - lesson_steps:
      min: 6
      labelled_subgoals: true
  - checkpoints:
      min: 4
  - result
  - wrapup
  - links
primm_required:
  predict: 1
  run: ">=2"
  investigate: 1
faded_scaffolding:
  required: true
  pattern: parsons
viz_compliance:
  palette: eegdash-rail
  required_elements:
    - subject_count_in_subtitle
    - sample_rate_in_subtitle
    - source_provenance_footer
links:
