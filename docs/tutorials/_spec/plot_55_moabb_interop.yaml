learning_objectives:
- After this tutorial you will be able to call `eegdash.splits.to_moabb_split_inputs`
  to convert a windowed EEGDash dataset into the `(y, metadata)` pair every MOABB
  splitter consumes.
- After this tutorial you will be able to run a small MOABB CrossSession evaluation
  on a paradigm-compatible dataset and read per-subject accuracy off the result frame.
- After this tutorial you will be able to compare two sklearn pipelines through
  the same MOABB evaluator and report mean and standard deviation across subjects.
- After this tutorial you will be able to fall back to a synthetic-results path
  when MOABB is not installed without breaking the tutorial smoke test.
audience: Intermediate ML user who completed plot_51 (cross-subject) and now wants
  to plug an EEGDash-curated dataset into the MOABB benchmark suite. Useful for
  any reader who maintains a paradigm-driven evaluation pipeline.
budgets:
  max_loc: 480
  max_runtime_seconds: 300
  max_network_mb: 80
  cpu_only: true
  gpu_required: false
artifacts:
