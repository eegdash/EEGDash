learning_objectives:
- After this tutorial you will be able to instantiate `EEGChallengeDataset(task='contrastChangeDetection',
  release='R5', mini=True)` and explain what `release` / `mini` control.
- After this tutorial you will be able to carve stimulus-locked CCD windows of shape
  `(n_chans=129, n_samples=200)` (2 s at 100 Hz, +0.5 s shift) using
  `braindecode.preprocessing.create_windows_from_events`.
- After this tutorial you will be able to split the cohort into 5 cross-subject folds
  with `sklearn.model_selection.KFold` and assert no subject leakage across folds.
- After this tutorial you will be able to train an `EEGNeX` baseline and report per-fold
  test accuracy with mean +/- std next to chance level on the same axes.
- After this tutorial you will be able to render a three-panel starter-kit figure
  (trial schematic, one CCD window, per-fold accuracy) via `draw_challenge_1_figure`
  and save the model state_dict for submission.
audience: Beginner-to-intermediate user who has loaded one challenge recording (plot_70)
  and one PyTorch DataLoader (plot_02), and now wants to ship a Challenge 1 submission
  end-to-end. Level 2 because the cross-subject split, the leakage assertion, and the
  Braindecode training loop are all in scope at once.
budgets:
  max_loc: 620
  max_runtime_seconds: 360
  max_network_mb: 200
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/tutorial_challenge_1.png
  figures:
  - figure_trial_schematic.png
  - figure_one_window_heatmap.png
  - figure_per_fold_accuracy.png
asserted_invariants:
- 'X.shape == (n_windows, 129, 200)   # Challenge 1 input contract'
- 'subject_overlap(train_subj, test_subj) == 0   # cross-subject KFold'
- len(fold_accuracies) == n_folds and all(0.0 <= a <= 1.0 for a in fold_accuracies)
- chance_level == 0.5 reported on the same axes as the per-fold bars
- mean_acc and std_acc printed next to chance on the result table
- weights_path.exists() after `torch.save(model.state_dict(), weights_path)`
