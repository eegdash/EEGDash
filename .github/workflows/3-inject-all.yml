# Inject all digested datasets to MongoDB
name: "3. Inject: All to MongoDB"

on:
  # Scheduled ingestion is now driven by full-pipeline.yml ("Daily Ingestion
  # Pipeline"), which fetches + digests + injects to production daily. This
  # workflow is kept for manual, inject-only runs (e.g. re-injecting an already
  # digested set to a chosen database).
  workflow_dispatch:
    inputs:
      database:
        description: 'Target database'
        required: true
        default: 'eegdash_staging'
        type: choice
        options:
          - eegdash_staging
          - eegdash
          - eegdash_v1
      dry_run:
        description: 'Dry run (validate without uploading)'
        required: false
        default: true
        type: boolean

jobs:
  inject:
    uses: ./.github/workflows/3-inject.yml
    with:
      source_name: "all"
      database: ${{ github.event.inputs.database || 'eegdash_staging' }}
      dry_run: ${{ github.event.inputs.dry_run == 'true' || github.event_name == 'schedule' }}
    secrets:
      DATASET_LISTINGS_TOKEN: ${{ secrets.DATASET_LISTINGS_TOKEN }}
      EEGDASH_ADMIN_TOKEN: ${{ secrets.EEGDASH_API_TOKEN }}

  summary:
    name: Summary
    needs: [inject]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## 💉 MongoDB Injection Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ${{ needs.inject.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Datasets | ${{ needs.inject.outputs.datasets_injected || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Records | ${{ needs.inject.outputs.records_injected || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
