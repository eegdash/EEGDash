learning_objectives:
- After this tutorial you will be able to query an auditory oddball dataset and reuse
  the event-mapping pattern from plot_20 with modality-specific adjustments.
- After this tutorial you will be able to compare auditory vs. visual P300 latency
  and topography on matching epoch windows.
- After this tutorial you will be able to retrain the same baseline classifier under
  a subject-aware split and contrast its metric table with the visual P300 result.
- After this tutorial you will be able to articulate which preprocessing/epoching
  choices changed between modalities and which stayed constant.
audience: "Intermediate user who has completed plot_20. The lesson is framed as a\
  \ contrast, not a duplicate, per plan \xA7Phase 3 step 3."
budgets:
  max_loc: 290
  max_runtime_seconds: 300
  max_network_mb: 200
  cpu_only: true
  gpu_required: false
artifacts:
