learning_objectives:
- After this tutorial you will be able to identify when independent feature definitions
  cause repeated spectral computation.
- After this tutorial you will be able to add a shared spectral preprocessor and declare
  downstream features (e.g., band powers, peak frequency, spectral entropy) that consume
  its output.
- After this tutorial you will be able to compare the resulting feature names and
  shapes to the flat extraction in plot_40 and quantify the wall-time saved.
- After this tutorial you will be able to read the feature dependency tree and predict
  which preprocessor each feature consumes.
audience: Intermediate user who finished plot_40 and at least one Cat B tutorial.
  Comfortable with basic spectral concepts; learns the feature-tree abstraction here.
budgets:
  max_loc: 600
  max_runtime_seconds: 300
  max_network_mb: 100
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_41.png
  figures:
  - figure_feature_tree_plate.png
asserted_invariants:
- feature_table_tree.shape[0] == feature_table_flat.shape[0]
- feature_table_tree.shape[1] >= feature_table_flat.shape[1]
- 'runtime_seconds_tree < runtime_seconds_flat * 0.9  # measurable speedup'
- spectral preprocessor invoked once per window across all dependent features
- feature column names disambiguate by channel and band
