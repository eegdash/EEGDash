asserted_invariants:
  - "downloaded_record_count == queried_record_count   # every queried file is on disk"
  - "all(Path(rec.local_path).exists() for rec in ds.records)"
  - "offline_dataset.records_count == online_dataset.records_count"
  - "cache_dir is parametrised (env var or argument), never hard-coded"
