estimated_runtime_minutes: 1
hardware: cpu
network: metadata_only
prerequisites: []
cites:
  plan:
  - tutorial_restructure_plan.md#L360-L370
  - tutorial_restructure_plan.md#L489-L501
  - tutorial_restructure_plan.md#L819-L844
  - tutorial_restructure_plan.md#L1158-L1178
