name: Ingestions — Lint + Test

on:
  pull_request:
    paths:
      - 'scripts/ingestions/**'
      - '.github/workflows/ingestions-lint-and-test.yml'
  push:
    branches: [main, master]
    paths:
      - 'scripts/ingestions/**'
  workflow_dispatch: {}

concurrency:
  group: ingestions-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install ruff
        run: pip install ruff>=0.4
      - name: Ruff check
        run: ruff check scripts/ingestions/
      - name: Ruff format --check
        run: ruff format --check scripts/ingestions/

  test:
    name: Pytest (unit + property + smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install ingestion package + dev deps
        run: pip install -e "scripts/ingestions[dev]"
      - name: Run tests with coverage (offline)
        working-directory: scripts/ingestions
        # Coverage gate per ROADMAP-C1.md C1.1. Floor RATCHETS up per PR.
        # 2026-05-22: bumped 35 → 38 after C1.2 covered _serialize.py
        # (0%→93%) + _validate.py (0%→20%). Current actual: 39%.
        # Every PR that adds tests must bump this floor in the same
        # commit so subsequent PRs can't regress.
        run: |
          pytest -ra --tb=short \
            -m "not network and not slow" \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=html \
            --cov-report=xml \
            --cov-fail-under=38
      - name: Append coverage summary to job summary
        if: always()
        working-directory: scripts/ingestions
        run: |
          {
            echo "## Coverage summary"
            echo
            echo "Floor: 35% (ratchets up per PR; see ROADMAP-C1.md C1.1)"
            echo
            echo '```'
            python -m coverage report --skip-covered 2>/dev/null | tail -40 || echo "no coverage data"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ingestions-coverage
          path: |
            scripts/ingestions/htmlcov/
            scripts/ingestions/coverage.xml
          retention-days: 14
