learning_objectives:
- After this tutorial you will be able to instantiate the `EEGDash` client and run
  a metadata-only query without downloading raw signals.
- After this tutorial you will be able to interpret the returned record fields, distinguish
  dataset documents from record documents, and pick a candidate dataset for follow-up
  tutorials.
- After this tutorial you will be able to filter records by BIDS entities (`dataset`,
  `subject`, `task`, `session`, `run`) and surface them in prose.
- After this tutorial you will be able to compute simple metadata statistics across
  results (subject count, sampling rates, total duration).
audience: Brand-new EEGDash user; no prior EEG-DaSh tutorials. Comfortable running
  Python in a notebook.
budgets:
  max_loc: 250
  max_runtime_seconds: 60
  max_network_mb: 5
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_00.png
  figures:
  - figure_record_count_by_task.png
  - figure_dataset_vs_record_summary.png
asserted_invariants:
- n_records_returned > 0
- n_records_returned <= search_limit
- all returned records carry BIDS entity keys (`dataset`, `subject`, `task`)
- no raw signal bytes downloaded during the tutorial
