id: project_pfactor_features
category: applied
kind: tutorial
output_kind: python
title: "Predicting p-factor from EEG with hand-crafted features (project starter)"
state: proposed
assignee: null
difficulty: 3
estimated_runtime_minutes: 5
hardware: cpu
network: cached_first_run
prerequisites:
  - plot_42_features_to_sklearn
  - plot_72_subject_invariant_regression
cites:
  plan:
    - "tutorial_restructure_plan.md#L458-L470"
    - "tutorial_restructure_plan.md#L1052-L1100"
    - "tutorial_restructure_plan.md#L1158-L1178"
    - "tutorial_restructure_plan.md#L1577-L1612"
  rubric:
    - "compass_artifact.md#E1.2"
    - "compass_artifact.md#E2.20"
    - "compass_artifact.md#E3.21"
    - "compass_artifact.md#E3.23"
    - "compass_artifact.md#E3.29"
    - "compass_artifact.md#E4.32"
    - "compass_artifact.md#E4.33"
