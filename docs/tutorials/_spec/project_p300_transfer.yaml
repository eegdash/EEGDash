learning_objectives:
- After this case study you will be able to load source + target oddball cohorts
  as `(n_windows, n_channels, n_times)` tensors and route them through a shared
  windowing recipe.
- After this case study you will be able to train three encoders on the same
  architecture and budget (naive source-only, AS-MMD aligned source+target,
  oracle target-only) and report target-set accuracy alongside chance on the
  same axes.
- After this case study you will be able to inspect the alignment effect via a
  2D PCA of penultimate-layer activations on source and target windows,
  side-by-side before and after AS-MMD.
- After this case study you will be able to verify that distribution-matching
  alignment did not collapse the underlying P3 component via a source-vs-target
  ERP overlay at Pz.
audience: Advanced user already comfortable with `plot_12` (training) and
  `plot_71` (cross-task transfer). This is project-tier applied material; PRIMM
  scaffolding is exempt per the difficulty-3 rubric.
budgets:
  max_loc: 600
  max_runtime_seconds: 600
  max_network_mb: 0
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/project_p300_transfer.png
  figures:
  - figure_target_accuracy_bars.png
  - figure_pca_before_after_mmd.png
  - figure_erp_overlay_pz.png
asserted_invariants:
- 'subject_overlap(source_train, source_test) == 0   # cross-subject for source'
- 'subject_overlap(target_train, target_test) == 0   # cross-subject for target'
- 'acc_mmd > acc_naive - 0.02   # AS-MMD at least non-harmful on the toy run'
- naive, AS-MMD, oracle, and chance reported on the same axes
- AS-MMD gain reported as `acc_mmd - acc_naive` in absolute accuracy
- standard:target imbalance is preserved (~3:1) and not silently rebalanced
- ERP at Pz on the target cohort retains a positive bump in the 300-450 ms band
