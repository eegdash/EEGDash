id: plot_40_first_features
category: E-feature-engineering
title: Extract a first feature table from EEG windows
state: proposed
assignee: null
difficulty: 1
estimated_runtime_minutes: 3
hardware: cpu
network: cached_first_run
prerequisites:
- plot_10_preprocess_and_window
cites:
  plan:
  - tutorial_restructure_plan.md#L410-L423
  - tutorial_restructure_plan.md#L489-L501
  - tutorial_restructure_plan.md#L977-L992
  - tutorial_restructure_plan.md#L1158-L1178
  rubric:
  - compass_artifact.md#E1.2
  - compass_artifact.md#E2.13
  - compass_artifact.md#E2.16
