learning_objectives:
  - "After this how-to you will be able to call `EEGDashDataset.download_all(n_jobs=...)` to prefetch every record for a query before any training run."
  - "After this how-to you will be able to estimate the on-disk footprint and decide whether to use the full release or `mini=True` for CI."
  - "After this how-to you will be able to validate the local cache by re-instantiating the dataset with `download=False` and checking record counts."
  - "After this how-to you will be able to redirect the cache to a chosen storage tier via `cache_dir` or the EEGDASH_CACHE environment variable."
audience: "User who has loaded one recording and is now staging data for a longer experiment, an HPC job, or an air-gapped session."
budgets:
  max_loc: 200
  max_runtime_seconds: 600
  max_network_mb: 2000
  cpu_only: true
  gpu_required: false
