learning_objectives:
  - "After this study you will be able to load EEG2025r5 metadata via `EEGChallengeDataset` with the p-factor target attached through `description_fields`."
  - "After this study you will be able to assemble a multi-family feature table (band power, connectivity, entropy) with the per-channel column convention `eegdash.features.extract_features` uses."
  - "After this study you will be able to construct a strict cross-subject split with `eegdash.splits.get_splitter('cross_subject')` and verify that no subject appears in both train and test."
  - "After this study you will be able to fit a sklearn regression head (ridge plus random forest), pull `feature_importances_` or coefficient magnitudes, and report Pearson r, R^2, MAE alongside `eegdash.splits.median_baseline`."
  - "After this study you will be able to phrase the result in clinical-cautious language: small N, single dataset, p-factor as a derived score not a diagnosis."
audience: "Advanced user; companion to project_pfactor_deep. Assumes prior plot_42 (features-to-sklearn) and plot_72 (cross-subject regression). Project-tier scaffolding rules apply."
budgets:
  max_loc: 480
  max_runtime_seconds: 600
  max_network_mb: 100
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/project_pfactor_features.png
  figures:
    - figure_feature_importance_topk.png
    - figure_pred_vs_true_scatter.png
    - figure_error_distribution.png
asserted_invariants:
  - "subject_overlap(train, test) == 0   # the defining property of cross-subject regression"
  - "leakage_report['column'] == 'subject' and leakage_report['overlap'] == 0"
  - "n_test_subjects_per_fold >= 1 and n_folds >= 5"
  - "r2_test reported alongside mae_test and median_baseline_mae"
  - "model_mae_test < median_baseline_mae   # a well-trained feature head beats predicting the median"
  - "p_factor_label_dtype is float and not nan-only"
  - "feature_importance_panel colour-codes by family (band-power, connectivity, entropy)"
  - "no_clinical_diagnosis_claim_in_prose   # reviewer hedging gate"
sections_required:
  - title
  - opening
  - learning_objectives
  - requirements
  - setup
  - lesson_steps:
      min: 6
      labelled_subgoals: true
  - checkpoints:
      min: 4
  - result
  - wrapup
  - links
primm_required:
