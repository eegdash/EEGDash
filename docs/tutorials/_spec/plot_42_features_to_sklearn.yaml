learning_objectives:
- After this tutorial you will be able to load the saved feature table from plot_40
  and split it by subject using `eegdash.splits`.
- After this tutorial you will be able to fit a `StandardScaler` on the train fold
  only and apply it to the test fold (no train/test contamination).
- After this tutorial you will be able to train logistic regression and a random forest
  (and optionally LightGBM) on the same features and compare metric tables.
- "After this tutorial you will be able to plot the top-k feature importances and\
  \ interpret them in EEG terms (channel \xD7 band)."
audience: Intermediate user who finished plot_40 and plot_11. Knows scikit-learn pipelines;
  learns leakage-safe scaling and EEG-specific feature interpretation here.
budgets:
  max_loc: 580
  max_runtime_seconds: 300
  max_network_mb: 50
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_42.png
  figures:
  - figure_metric_table_compare.png
  - figure_confusion_matrix.png
  - figure_top_feature_importance.png
asserted_invariants:
- scaler fitted only on X_train (no test data accessed before split)
- leakage_report['overlap'] == 0
- model_accuracy_test reported with chance level from class balance
- logistic_regression_accuracy and random_forest_accuracy both reported
- "top_feature_importances annotated with channel \xD7 band labels"
