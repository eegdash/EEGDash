learning_objectives:
- After this tutorial you will be able to evaluate a feature-based scikit-learn pipeline
  and a small neural network (sklearn ``MLPClassifier``) on the *exact same* cross-subject
  folds, by reusing one split manifest.
- After this tutorial you will be able to produce a paired per-fold score table and
  run a paired Wilcoxon signed-rank test to ask whether the difference is significant.
- After this tutorial you will be able to plot a paired-comparison figure (per-fold
  lines + box/violin) with the chance level on the same axes.
- "After this tutorial you will be able to phrase the conclusion with appropriate\
  \ hedging \u2014 small sample, single dataset, fixed hyperparameters \u2014 so the\
  \ comparison is not over-claimed."
audience: Intermediate user who completed plot_11, plot_12, plot_42 and plot_51. Knows
  how to run each pipeline alone; learns here how to compare them paper-style under
  one split manifest.
budgets:
  max_loc: 333
  max_runtime_seconds: 300
  max_network_mb: 50
  cpu_only: true
  gpu_required: false
artifacts:
  thumbnail: thumbnails/plot_54.png
  figures:
  - figure_paired_comparison.png
  - figure_per_fold_score_table.png
  - figure_split_audit.png
asserted_invariants:
- 'fold_ids_pipeline_a == fold_ids_pipeline_b   # same split manifest reused'
- subject_overlap(train, test) == 0
- len(per_fold_scores_a) == len(per_fold_scores_b) and len(per_fold_scores_a) >= 5
- wilcoxon_signed_rank_p_value reported alongside median delta
- chance_level reported on the same axes for BOTH pipelines
- abs(class_balance_train - class_balance_test) < 0.10
- leakage_report['column'] == 'subject' and leakage_report['overlap'] == 0
